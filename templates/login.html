{% extends 'base.html' %}

{% block content %}
<div class="ledger-sheet">
    <div class="ledger-sheet__head">
        <p class="ledger-sheet__eyebrow">Manifest Access</p>
        <h1>Welcome back</h1>
        <p class="ledger-sheet__sub">Sign the register to open today's list.</p>
    </div>

    <form action="{{ url_for('login') }}" method="POST" class="sign-form">
        <div class="sign-field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autocomplete="username">
        </div>

        <div class="sign-field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn--stamp btn--block">Sign In</button>
    </form>

    <p class="ledger-sheet__foot">Don't have an account? <a href="{{ url_for('register') }}">Sign up here</a></p>
</div>
{% endblock %}
